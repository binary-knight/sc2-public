# build.conf - declares WHERE the SC2 build pulls its artifacts from.
#
# Sourced by build/fetch-artifacts.sh (bash). This file is the single source of
# truth for the offline payload: which RPMs, which container images, and which
# bundle 'copy' artifacts go into a bundle. None of that content is committed to
# git - it is fetched fresh from the locations declared here.
#
# Two profiles:
#   public - build from a plain internet-connected machine (home / GitHub CI).
#            Public CentOS vault + docker-ce repo + UBI images + docker.io.
#   work   - build inside the corporate network (GitLab CI). Internal RHEL
#            mirror (Satellite/Katello) + internal container registry.
#
# Select with the SC2_PROFILE env var (default: public), e.g.
#   SC2_PROFILE=work build/fetch-artifacts.sh
#
# Fields are plain bash; keep values quoted and free of spaces in paths.

SC2_PROFILE="${SC2_PROFILE:-public}"

# ---------------------------------------------------------------------------
# RHEL majors to build RPM closures for, and the closure "roots" per major.
# fetch-artifacts.sh resolves the FULL dependency set from these, so list only
# the top-level packages SC2 needs; yum/dnf pulls in the rest.
# (These lists were previously hardcoded in build/build-bundle.sh.)
# ---------------------------------------------------------------------------
SC2_MAJORS="7 8 9 10"

RPMS_EL7="docker-ce docker-ce-cli containerd.io container-selinux slirp4netns fuse-overlayfs"
RPMS_EL8="podman container-selinux"
RPMS_EL9="podman container-selinux"
RPMS_EL10="podman container-selinux"

# ---------------------------------------------------------------------------
# Container images to bake into the bundle.
# One row per image, pipe-separated:  <ref> | <dest-archive> | <save-tag>
#   ref         image path+tag, WITHOUT registry host (registry is prepended
#               from IMAGE_REGISTRY below, so the same table works per profile)
#   dest-archive path under the tree the archive is written to:
#                 images/*     -> managed-app images (referenced by apps/*/manifest)
#                 containers/* -> pre-loaded images (auto-loaded, no manifest)
#   save-tag    the tag the archive is 'save'd under. MUST match the image name
#               used in the app's docker-compose.yml (see docs/BUNDLING.md).
# ---------------------------------------------------------------------------
IMAGES="
library/busybox:1.36 | images/sc2-example-busybox-1.0.0.tgz | sc2-example-busybox:1.0.0
library/httpd:2.4     | images/sc2-secure-httpd-1.0.tgz      | sc2-secure-httpd:1.0
library/busybox:1.36 | containers/preloaded-2.0.tgz          | preloaded:2.0
"

# ---------------------------------------------------------------------------
# Bundle 'copy' artifact payloads (the files bundle.conf copies onto the host).
# One row per payload, pipe-separated:  <source> | <dest-under-artifacts>
#   source       file:///abs/path, https://..., or a GitLab generic-package URL
#   dest         path under artifacts/ (use artifacts/fetched/... for big blobs;
#                that path is git-ignored)
# The small text sample artifacts/app/ is checked into the repo, so this is
# empty by default. Add real (large/binary) payloads here.
# ---------------------------------------------------------------------------
ARTIFACTS=""

# ===========================================================================
# Profile: public  (home / GitHub - public internet sources)
# ===========================================================================
if [ "$SC2_PROFILE" = public ]; then
    IMAGE_REGISTRY="docker.io"

    # Base images the closures are resolved inside. el7 uses the CentOS 7 vault
    # + docker-ce repo (handled in fetch-artifacts.sh); el8/9/10 use UBI.
    # NOTE: UBI does not expose the full RHEL repos, so container-selinux for
    # el8/el9 may be incomplete here - use the 'work' profile (subscribed
    # mirror) for a guaranteed-complete closure. See docs/BUNDLING.md.
    BASEIMG_EL7="centos:7"
    BASEIMG_EL8="registry.access.redhat.com/ubi8/ubi:latest"
    BASEIMG_EL9="registry.access.redhat.com/ubi9/ubi:latest"
    BASEIMG_EL10="registry.access.redhat.com/ubi10/ubi:latest"

    # No internal mirror in this profile (empty = use the base image's own repos)
    RPM_MIRROR_BASE=""
fi

# ===========================================================================
# Profile: work  (GitLab CI / corporate network - internal mirror + registry)
# Fill these in with your real internal endpoints, or override via CI variables.
# ===========================================================================
if [ "$SC2_PROFILE" = work ]; then
    # Internal container registry that mirrors library/* (or holds your own
    # copies). fetch-artifacts.sh pulls "${IMAGE_REGISTRY}/${ref}".
    IMAGE_REGISTRY="${SC2_IMAGE_REGISTRY:-registry.example.corp/sc2}"

    # Base images that DO carry the full RHEL repos (subscribed RHEL images or
    # internal equivalents), so closures - including container-selinux - resolve.
    BASEIMG_EL7="${SC2_BASEIMG_EL7:-registry.example.corp/rhel7:latest}"
    BASEIMG_EL8="${SC2_BASEIMG_EL8:-registry.example.corp/rhel8:latest}"
    BASEIMG_EL9="${SC2_BASEIMG_EL9:-registry.example.corp/rhel9:latest}"
    BASEIMG_EL10="${SC2_BASEIMG_EL10:-registry.example.corp/rhel10:latest}"

    # RPM strategy: SUBSCRIBED BASE IMAGES (no internal mirror). The closures are
    # resolved using the repos inside the BASEIMG_EL* images above, so this stays
    # EMPTY on purpose. (If you later stand up a yum/dnf mirror, set
    # SC2_RPM_MIRROR_BASE=<url> and fetch-artifacts.sh will point the build
    # container at "<url>/el<major>/..." and disable the image's own repos.)
    RPM_MIRROR_BASE="${SC2_RPM_MIRROR_BASE:-}"
fi
