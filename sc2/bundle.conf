# bundle.conf - pre-bundle install directives, authored before shipping.
# One directive per line, whitespace-separated, no spaces in paths.
# Applied in order during 'sc2 install' (and re-applied on 'sc2 upgrade');
# everything is ledger-recorded so 'sc2 remove' undoes it.
#
# Directives:
#   copy  <bundle-relative-src> <absolute-dest>   copy files/dirs onto the host
#   mkdir <absolute-path> [octal-mode]            create a directory
#   port  <port/proto>                            open a firewall port
#   run   <command...>                            post-install hook (runs as root,
#                                                 after apps are deployed)
#
# Example wiring for the bundled artifacts/app payload:
copy artifacts/app /opt/app
run /bin/sh /opt/app/setup.sh
